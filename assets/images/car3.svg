<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f2d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Road -->
  <rect y="400" width="1200" height="200" fill="#1a1a1a"/>
  <line x1="0" y1="450" x2="1200" y2="450" stroke="#ffff00" stroke-width="4" stroke-dasharray="60,40"/>
  
  <!-- Luxury Car body -->
  <ellipse cx="600" cy="375" rx="220" ry="90" fill="url(#carGradient)"/>
  <path d="M 380 280 Q 600 220 820 280 L 800 370 L 400 370 Z" fill="url(#carGradient)"/>
  
  <!-- Luxury car windows (tinted) -->
  <rect x="420" y="295" width="125" height="65" rx="12" fill="#4a7ba7" opacity="0.8"/>
  <rect x="655" y="295" width="125" height="65" rx="12" fill="#4a7ba7" opacity="0.8"/>
  <polygon points="800,310 850,320 840,360" fill="#4a7ba7" opacity="0.8"/>
  
  <!-- Chrome details -->
  <rect x="375" y="370" width="850" height="4" fill="#c0c0c0"/>
  
  <!-- Wheels (Premium) -->
  <circle cx="460" cy="390" r="60" fill="#333"/>
  <circle cx="460" cy="390" r="42" fill="#555"/>
  <polygon points="460,348 480,375 460,402 440,375" fill="#888"/>
  
  <circle cx="740" cy="390" r="60" fill="#333"/>
  <circle cx="740" cy="390" r="42" fill="#555"/>
  <polygon points="740,348 760,375 740,402 720,375" fill="#888"/>
  
  <!-- Headlights (LED) -->
  <rect x="340" y="350" width="35" height="35" rx="5" fill="#ffff00"/>
  <line x1="345" y1="355" x2="370" y2="365" stroke="#fff" stroke-width="2"/>
  <line x1="345" y1="365" x2="370" y2="355" stroke="#fff" stroke-width="2"/>
  
  <!-- Ambient lighting -->
  <ellipse cx="600" cy="500" rx="400" ry="80" fill="#ffaa00" opacity="0.15"/>
  
  <!-- Text -->
  <text x="600" y="560" font-size="52" font-weight="bold" fill="#ffd700" text-anchor="middle" font-family="Arial">Luxury Transport</text>
</svg>