<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5aa0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a52;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Road -->
  <rect y="420" width="1200" height="180" fill="#2a2a2a"/>
  <line x1="0" y1="470" x2="1200" y2="470" stroke="#ffff00" stroke-width="3" stroke-dasharray="50,30"/>
  
  <!-- Car body (SUV) -->
  <ellipse cx="600" cy="390" rx="210" ry="85" fill="#1e90ff"/>
  <rect x="390" y="280" width="420" height="110" rx="15" fill="#1e90ff"/>
  
  <!-- Car windows -->
  <rect x="430" y="305" width="110" height="70" rx="10" fill="#87ceeb"/>
  <rect x="660" y="305" width="110" height="70" rx="10" fill="#87ceeb"/>
  <rect x="800" y="310" width="80" height="50" rx="8" fill="#87ceeb"/>
  
  <!-- Car door lines -->
  <line x1="590" y1="280" x2="590" y2="390" stroke="#333" stroke-width="2"/>
  <line x1="610" y1="280" x2="610" y2="390" stroke="#333" stroke-width="2"/>
  
  <!-- Wheels -->
  <circle cx="470" cy="410" r="55" fill="#333"/>
  <circle cx="470" cy="410" r="38" fill="#555"/>
  <circle cx="730" cy="410" r="55" fill="#333"/>
  <circle cx="730" cy="410" r="38" fill="#555"/>
  
  <!-- Headlights -->
  <circle cx="360" cy="365" r="22" fill="#ffff00"/>
  <circle cx="360" cy="365" r="16" fill="#ffffcc"/>
  
  <!-- Fog lights -->
  <circle cx="350" cy="395" r="15" fill="#fff" opacity="0.7"/>
  
  <!-- Roof rack -->
  <rect x="420" y="270" width="360" height="8" fill="#666" opacity="0.7"/>
  
  <!-- Text -->
  <text x="600" y="540" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial">Diverse Fleet Selection</text>
</svg>