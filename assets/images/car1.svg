<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Road -->
  <rect y="400" width="1200" height="200" fill="#333"/>
  <line x1="0" y1="450" x2="1200" y2="450" stroke="#ffff00" stroke-width="3" stroke-dasharray="50,30"/>
  
  <!-- Car body -->
  <ellipse cx="600" cy="380" rx="200" ry="80" fill="#ff6b35"/>
  <rect x="400" y="280" width="400" height="100" rx="20" fill="#ff6b35"/>
  
  <!-- Car windows -->
  <rect x="450" y="300" width="100" height="60" rx="10" fill="#87ceeb"/>
  <rect x="650" y="300" width="100" height="60" rx="10" fill="#87ceeb"/>
  
  <!-- Car doors line -->
  <line x1="600" y1="280" x2="600" y2="380" stroke="#333" stroke-width="2"/>
  
  <!-- Wheels -->
  <circle cx="480" cy="400" r="50" fill="#333"/>
  <circle cx="480" cy="400" r="35" fill="#666"/>
  <circle cx="720" cy="400" r="50" fill="#333"/>
  <circle cx="720" cy="400" r="35" fill="#666"/>
  
  <!-- Headlights -->
  <circle cx="380" cy="360" r="20" fill="#ffff00"/>
  <circle cx="380" cy="360" r="15" fill="#ffffcc"/>
  
  <!-- Sky elements -->
  <circle cx="150" cy="100" r="40" fill="#fff" opacity="0.8"/>
  <circle cx="1050" cy="150" r="50" fill="#fff" opacity="0.6"/>
  
  <!-- Text -->
  <text x="600" y="550" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial">Premium Vehicle Rental</text>
</svg>