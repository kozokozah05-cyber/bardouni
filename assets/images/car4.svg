<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5aa0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a52;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Road -->
  <rect y="410" width="1200" height="190" fill="#222"/>
  <line x1="0" y1="460" x2="1200" y2="460" stroke="#ffff00" stroke-width="3" stroke-dasharray="50,30"/>
  
  <!-- Modern Car body -->
  <ellipse cx="600" cy="385" rx="215" ry="88" fill="#2a2a2a"/>
  <rect x="385" y="270" width="430" height="115" rx="18" fill="#2a2a2a"/>
  
  <!-- Modern sharp windows -->
  <polygon points="430,300 545,280 545,360 430,370" fill="#5dd4ff" opacity="0.85"/>
  <polygon points="655,280 770,300 770,370 655,360" fill="#5dd4ff" opacity="0.85"/>
  <polygon points="800,310 860,315 850,360" fill="#5dd4ff" opacity="0.85"/>
  
  <!-- LED lights effect -->
  <rect x="370" y="350" width="20" height="30" fill="#00ddff"/>
  <rect x="372" y="352" width="16" height="26" fill="#00ffff" opacity="0.7"/>
  
  <!-- Grille -->
  <rect x="385" y="360" width="60" height="35" fill="#1a1a1a"/>
  <line x1="395" y1="360" x2="395" y2="395" stroke="#555" stroke-width="1"/>
  <line x1="405" y1="360" x2="405" y2="395" stroke="#555" stroke-width="1"/>
  <line x1="415" y1="360" x2="415" y2="395" stroke="#555" stroke-width="1"/>
  <line x1="425" y1="360" x2="425" y2="395" stroke="#555" stroke-width="1"/>
  
  <!-- Wheels (Modern) -->
  <circle cx="475" cy="405" r="58" fill="#222"/>
  <circle cx="475" cy="405" r="40" fill="#444"/>
  <circle cx="475" cy="405" r="25" fill="#111"/>
  
  <circle cx="725" cy="405" r="58" fill="#222"/>
  <circle cx="725" cy="405" r="40" fill="#444"/>
  <circle cx="725" cy="405" r="25" fill="#111"/>
  
  <!-- Side mirror -->
  <ellipse cx="350" cy="330" rx="20" ry="25" fill="#2a2a2a"/>
  <ellipse cx="351" cy="330" rx="12" ry="18" fill="#5dd4ff" opacity="0.7"/>
  
  <!-- Spoiler/Aerodynamic detail -->
  <polygon points="820,280 840,280 835,370" fill="#1a1a1a"/>
  
  <!-- Chrome accents -->
  <line x1="385" y1="370" x2="815" y2="370" stroke="#666" stroke-width="2"/>
  
  <!-- Text -->
  <text x="600" y="540" font-size="48" font-weight="bold" fill="#00ddff" text-anchor="middle" font-family="Arial" letter-spacing="2">Modern & Reliable</text>
</svg>